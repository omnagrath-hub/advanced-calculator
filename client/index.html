<!DOCTYPE html>
<html>
<head>
  <title>Secret Messages</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h1>Secret Messages</h1>
  <p class="subtitle">Private group chat hub</p>

  <div class="mode-buttons">
    <button onclick="setMode('register')">Create Account</button>
    <button onclick="setMode('login')">Sign In</button>
  </div>

  <div class="form-group register-only">
    <label>First Name</label>
    <input id="firstName" placeholder="Enter your first name">
  </div>

  <div class="form-group register-only">
    <label>Last Name</label>
    <input id="lastName" placeholder="Enter your last name">
  </div>

  <div class="form-group">
    <label>Username</label>
    <input id="username" placeholder="Enter username">
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Enter password">
      <span class="toggle" onclick="togglePassword()">👁</span>
    </div>
  </div>

  <button onclick="handleSubmit()">Continue</button>
</div>

<!-- CHAT -->
<div id="chat" class="card" style="display:none;">
  <div class="chat-header">
    <h2 id="userDisplay"></h2>

    <div class="theme-dropdown">
      <button onclick="toggleThemeMenu()" class="theme-btn">
        🎨 Themes
      </button>

      <div id="themeMenu" class="theme-menu">
        <div onclick="setTheme('default')">Default</div>
        <div onclick="setTheme('space')">Space</div>
        <div onclick="setTheme('aqua')">Aqua</div>
        <div onclick="setTheme('desert')">Desert</div>
        <div onclick="setTheme('arctic')">Arctic</div>
        <div onclick="setTheme('forest')">Forest</div>
        <div onclick="setTheme('mountain')">Mountain</div>
        <div onclick="setTheme('futuristic')">Futuristic</div>
      </div>
    </div>
  </div>

  <div id="messages"></div>

  <input id="msgInput" placeholder="Write your message here...">
  <button onclick="sendMessage()">Send</button>
</div>

<script src="./app.js"></script>
</body>
</html>
